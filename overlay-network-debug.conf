# Network debug / stable attach profile for first-time SIM bring-up.
#
# Goals:
# 1) Do not lock to a single PLMN while validating SIM/network.
# 2) Allow both LTE-M and NB-IoT so modem can pick what is available.
# 3) Disable PSM request during bring-up to avoid early sleep side effects.

# Use dual-mode attach (more robust than NB-IoT-only for first bring-up).
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=y
CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=n

# Do not lock to a fixed operator while debugging registration.
CONFIG_LTE_LOCK_PLMN=n

# Keep modem active during initial bring-up/debug.
CONFIG_LTE_PSM_REQ=n
