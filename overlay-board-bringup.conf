# =============================
# Board Bring-up Unified Config
# =============================
# 用于“硬件联调模式”：
# - 在主应用 main.c 内运行（单线程定时任务）
# - 保留 nPM1300 + ICM42688 + LED 联调能力
# - 强制 UART 日志输出，方便串口调试

# 基础外设
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SENSOR=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SPI_NOR=y
CONFIG_REGULATOR=y

# nPM1300 相关驱动（当前先用于连通/状态读取）
CONFIG_MFD_NPM13XX=y
CONFIG_NPM13XX_CHARGER=y

# 串口与日志
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# 调试时避免 AT Host 抢占串口
CONFIG_AT_HOST_LIBRARY=n

# 线程栈
CONFIG_MAIN_STACK_SIZE=4096

# ======================
# Cellular + Cloud (统一)
# ======================
# 使用 UUID 作为 nRF Cloud Device ID（与你已 provision 的证书体系一致）
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_INTERNAL_UUID=y

# 中国移动 NB-IoT（46000）
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=n
CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=y
CONFIG_LTE_LOCK_PLMN=y
CONFIG_LTE_LOCK_PLMN_STRING="46000"

# ===========================
# TF-M / SPU 安全域实例分配
# ===========================
# 当前目标：把 instance1(0x40009000) 释放给 Non-secure（应用侧）以便后续挂 SPI1。
# 如果保持 TFM_SECURE_UART1=y，UARTE1 会被 Secure 占用，SPIM1/TWIM1 也会受影响。
CONFIG_TFM_SECURE_UART=n
CONFIG_TFM_LOG_LEVEL_SILENCE=y
CONFIG_NRF_UARTE1_SECURE=n
CONFIG_NRF_SPIM1_SECURE=n
CONFIG_NRF_TWIM1_SECURE=n
